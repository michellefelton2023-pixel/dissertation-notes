<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dissertation Research Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

        :root {
            --royal-blue: #002366;
            --gold-bright: #D4AF37;
            --cream-bg: #F8F9FA;
            --border: #DDE2E8;
            --text: #1A1A1A;
            --muted: #5A6675;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream-bg); color: var(--text); min-height: 100vh; }

        header { background: var(--royal-blue); color: var(--white); position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--gold-bright); box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 28px; }
        .header-title h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; letter-spacing: 0.02em; }
        
        .nav-buttons { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; font-size: 0.75rem; cursor: pointer; transition: 0.2s; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-gold { background: var(--gold-bright); color: var(--royal-blue); font-weight: 800; text-transform: uppercase; }
        .btn-outline { background: transparent; color: var(--white); border: 1px solid rgba(255,255,255,0.4); }

        .main-layout { display: grid; grid-template-columns: 450px 1fr; gap: 0; min-height: calc(100vh - 75px); }
        .entry-panel { padding: 25px; border-right: 1px solid var(--border); background: var(--white); overflow-y: auto; max-height: calc(100vh - 75px); }
        .notes-panel { padding: 25px; overflow-y: auto; max-height: calc(100vh - 75px); }

        .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
        label { font-size: 0.7rem; text-transform: uppercase; color: var(--royal-blue); font-weight: 800; letter-spacing: 0.06em; }
        input, textarea, select { padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; background: var(--cream-bg); font-size: 0.9rem; }
        
        #searchBar { width: 100%; padding: 10px 15px; border-radius: 20px; border: 2px solid var(--border); font-family: inherit; margin-bottom: 15px; outline: none; }
        #searchBar:focus { border-color: var(--gold-bright); background: white; }

        .lens-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; background: #f0f4f8; padding: 10px; border-radius: 8px; }
        .lens-option { font-size: 0.75rem; display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 500; }

        .note-card { background: white; border: 1px solid var(--border); padding: 22px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border-left: 5px solid var(--royal-blue); position: relative; }
        .delete-note-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.2rem; }
        .delete-note-btn:hover { color: #cc0000; }
        
        .note-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; padding-right: 20px; }
        .note-type-tag { font-size: 0.65rem; background: var(--royal-blue); color: var(--white); padding: 3px 10px; border-radius: 3px; text-transform: uppercase; font-weight: 600; }
        .note-source { font-family: 'Cormorant Garamond', serif; font-weight: 700; color: var(--royal-blue); font-size: 1.3rem; }
        .note-quote { background: #f0f4f8; border-left: 3px solid var(--gold-bright); padding: 14px; font-style: italic; margin: 12px 0; font-size: 0.95rem; color: #334455; line-height: 1.5; }
        
        .pill { display: inline-block; background: rgba(0, 35, 102, 0.08); color: var(--royal-blue); font-size: 0.65rem; padding: 2px 10px; border-radius: 4px; margin-right: 6px; margin-top: 10px; font-weight: 700; }
        .link-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 0.8rem; color: var(--royal-blue); text-decoration: none; font-weight: 700; padding: 6px 12px; background: #FFF9E6; border: 1px solid var(--gold-bright); border-radius: 6px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,35,102,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; border-top: 10px solid var(--gold-bright); }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } .entry-panel { border-right: none; max-height: none; } }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="header-title">
            <h1>✦ Dissertation Hub</h1>
        </div>
        <div class="nav-buttons">
            <a href="PASTE_YOUR_GOOGLE_DRIVE_URL_HERE" target="_blank" class="btn btn-gold">📂 Access Master Files</a>
            <button class="btn btn-outline" onclick="openExport()">Sync/Backup</button>
        </div>
    </div>
</header>

<div class="main-layout">
    <div class="entry-panel">
        <div class="form-group">
            <label>Entry Type</label>
            <select id="type" onchange="toggleOtherType()">
                <option value="Journal Article">Journal Article</option>
                <option value="Book Chapter">Book Chapter</option>
                <option value="Media (YouTube/Video)">Media (YouTube/Video)</option>
                <option value="GoodNotes / Paper Note">GoodNotes / Paper Note</option>
                <option value="Past Assignment">Past Assignment</option>
                <option value="Raw Reflection">Raw Reflection</option>
                <option value="Other">Other...</option>
            </select>
        </div>

        <div class="form-group" id="otherTypeContainer" style="display:none;">
            <label>Specify Type</label>
            <input type="text" id="otherTypeInput" placeholder="e.g., Podcast">
        </div>

        <div class="form-group">
            <label>Author / Source Name</label>
            <input type="text" id="author" placeholder="e.g., Ahmed (2017)">
        </div>

        <div class="form-group">
            <label>Title / Topic</label>
            <input type="text" id="title" placeholder="e.g., Leadership Identity">
        </div>

        <div class="form-group">
            <label>Resource Link</label>
            <input type="url" id="externalLink" placeholder="https://...">
        </div>

        <div class="form-group">
            <label>Key Content / Quote</label>
            <textarea id="quote" style="height:100px" placeholder="Quote from source..."></textarea>
        </div>

        <div class="form-group">
            <label>My Synthesis / Analysis</label>
            <textarea id="meaning" style="height:100px" placeholder="Your critical thoughts..."></textarea>
        </div>

        <div class="form-group">
            <label>Theoretical Lenses</label>
            <div class="lens-grid">
                <label class="lens-option"><input type="checkbox" class="lens" value="Identity"> Identity</label>
                <label class="lens-option"><input type="checkbox" class="lens" value="Feminist"> Feminist</label>
                <label class="lens-option"><input type="checkbox" class="lens" value="Intersectionality"> Intersectionality</label>
                <label class="lens-option"><input type="checkbox" class="lens" value="Agency"> Agency</label>
                <label class="lens-option"><input type="checkbox" class="lens" value="Critical Theory"> Critical Theory</label>
                <label class="lens-option"><input type="checkbox" class="lens" value="Organizational Norms"> Org. Norms</label>
                <label class="lens-option"><input type="checkbox" class="lens" value="Decolonial Systems"> Decolonial</label>
                <label class="lens-option"><input type="checkbox" class="lens" value="Leadership"> Leadership</label>
            </div>
        </div>

        <button class="btn btn-gold" style="width:100%; padding:15px; margin-top:10px" onclick="saveNote()">Save to Research Hub</button>
    </div>

    <div class="notes-panel">
        <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px; border-bottom: 2px solid var(--border); padding-bottom: 15px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="font-family:'Cormorant Garamond', serif; color: var(--royal-blue)">Research Archive</h2>
                <span id="count" style="font-size:0.8rem; font-weight:800; color:var(--gold-bright); background: var(--royal-blue); padding: 4px 12px; border-radius: 20px;">0 ENTRIES</span>
            </div>
            <input type="text" id="searchBar" placeholder="🔍 Search themes, authors, or analysis..." onkeyup="renderNotes()">
        </div>
        <div id="notesContainer"></div>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h3 style="color: var(--royal-blue)">Data Sync / Backup</h3>
        <p style="font-size:0.8rem; color:var(--muted); margin: 10px 0;">To sync between computers: Copy this text, save it to your Drive, and paste it here on your other computer.</p>
        <textarea style="width:100%; height:150px; padding:10px; font-family:monospace; font-size:0.75rem;" id="exportContent"></textarea>
        <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:15px">
            <button class="btn btn-gold" onclick="copyData()">Copy All</button>
            <button class="btn" style="background:var(--royal-blue); color:white" onclick="importData()">Import from Text</button>
            <button class="btn" style="background:#eee" onclick="closeModal()">Close</button>
            <button class="btn" style="color:red; font-size:0.7rem; margin-left:auto" onclick="clearData()">Wipe All</button>
        </div>
    </div>
</div>

<script>
    let notes = JSON.parse(localStorage.getItem('diss_final_v7')) || [];

    function toggleOtherType() {
        const typeSelect = document.getElementById('type');
        const otherContainer = document.getElementById('otherTypeContainer');
        otherContainer.style.display = (typeSelect.value === 'Other') ? 'flex' : 'none';
    }

    function saveNote() {
        const author = document.getElementById('author').value;
        if(!author) return alert("Please enter a source name.");
        let finalType = document.getElementById('type').value;
        if(finalType === 'Other') finalType = document.getElementById('otherTypeInput').value || 'Other';

        const note = {
            id: Date.now(),
            type: finalType,
            author,
            title: document.getElementById('title').value,
            link: document.getElementById('externalLink').value,
            quote: document.getElementById('quote').value,
            meaning: document.getElementById('meaning').value,
            lenses: Array.from(document.querySelectorAll('.lens:checked')).map(el => el.value),
            date: new Date().toLocaleDateString()
        };
        notes.unshift(note);
        localStorage.setItem('diss_final_v7', JSON.stringify(notes));
        renderNotes();
        clearForm();
    }

    function deleteNote(id) {
        if(confirm("Permanently delete this entry?")) {
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('diss_final_v7', JSON.stringify(notes));
            renderNotes();
        }
    }

    function renderNotes() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const container = document.getElementById('notesContainer');
        const filteredNotes = notes.filter(n => {
            const content = `${n.author} ${n.title} ${n.quote} ${n.meaning} ${n.lenses.join(' ')} ${n.type}`.toLowerCase();
            return content.includes(query);
        });
        document.getElementById('count').innerText = `${filteredNotes.length} MATCHES`;
        container.innerHTML = filteredNotes.map(n => {
            let linkLabel = "View Resource";
            if (n.link.includes('youtube.com') || n.link.includes('youtu.be')) linkLabel = "▶ Watch YouTube";
            if (n.link.includes('drive.google.com')) linkLabel = "📄 View in Drive";
            return `
            <div class="note-card">
                <button class="delete-note-btn" onclick="deleteNote(${n.id})">×</button>
                <div class="note-header">
                    <span class="note-type-tag">${n.type}</span>
                    <span style="font-size:0.7rem; color:var(--muted); font-weight:700">${n.date}</span>
                </div>
                <div class="note-source">${n.author}${n.title ? ': ' + n.title : ''}</div>
                ${n.link ? `<a href="${n.link}" target="_blank" class="link-badge">${linkLabel} ↗</a>` : ''}
                ${n.quote ? `<div class="note-quote">"${n.quote}"</div>` : ''}
                <div style="font-size:0.9rem; margin-top:12px; line-height:1.6"><strong style="color:var(--royal-blue)">Analysis:</strong> ${n.meaning}</div>
                <div>${n.lenses.map(l => `<span class="pill">${l}</span>`).join('')}</div>
            </div>`;
        }).join('');
    }

    function clearForm() {
        ['author','title','quote','meaning','externalLink','otherTypeInput'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('type').value = 'Journal Article';
        document.getElementById('otherTypeContainer').style.display = 'none';
        document.querySelectorAll('.lens').forEach(el => el.checked = false);
    }

    function openExport() {
        document.getElementById('modal').classList.add('open');
        document.getElementById('exportContent').value = JSON.stringify(notes, null, 2);
    }
    function closeModal() { document.getElementById('modal').classList.remove('open'); }
    function copyData() {
        document.getElementById('exportContent').select();
        document.execCommand('copy');
        alert("Backup copied to clipboard!");
    }
    function importData() {
        try {
            const data = JSON.parse(document.getElementById('exportContent').value);
            if(confirm("This will overwrite your current notes with the imported list. Proceed?")) {
                notes = data;
                localStorage.setItem('diss_final_v7', JSON.stringify(notes));
                renderNotes();
                closeModal();
                alert("Import successful!");
            }
        } catch(e) { alert("Invalid data. Please paste the backup text correctly."); }
    }
    function clearData() {
        if(confirm("Wipe all data?")) {
            notes = [];
            localStorage.removeItem('diss_final_v7');
            renderNotes();
            closeModal();
        }
    }
    renderNotes();
</script>
</body>
</html>
